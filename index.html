<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <title>GeoPhoto Kraków PWA</title>
    
    <style>
        .app-header { background: #1a237e; color: white; padding: 20px 0; margin-bottom: 20px; }
        #map { height: 350px; border-radius: 12px; margin-bottom: 20px; border: 2px solid #ddd; z-index: 1; }
        #player { width: 100%; border-radius: 12px; background: #000; }
        #canvas { display: none; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="bg-light">
    <header class="app-header text-center shadow">
        <h1>GeoPhoto: Kraków</h1>
        <p>Twoje znaleziska w jednym miejscu</p>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Zrób zdjęcie GeoCatcha</h5>
                        <video id="player" autoplay playsinline></video>
                        <canvas id="canvas"></canvas>
                        <button id="capture" class="btn btn-success btn-lg w-100 mt-3 shadow">Zapisz foto i lokalizację</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Twoja Lokalizacja</h5>
                        <div id="map"></div>
                        <button id="share" class="btn btn-primary w-100">Udostępnij</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
