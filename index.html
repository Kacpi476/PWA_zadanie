<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>GeoPhoto Finder - PWA Geocaching</title>
    <style>
        .app-header { background: #2e7d32; color: white; padding: 20px 0; margin-bottom: 20px; }
        #map { height: 300px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-light">
    <header class="app-header text-center">
        <h1>GeoPhoto Finder</h1>
        <p>Twoje znaleziska w jednym miejscu</p>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Zrób zdjęcie znaleziska</h5>
                        <div></div>
                        <button class="btn btn-success w-100 mt-3">Zapisz Odkrycie</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Twoja Lokalizacja</h5>
                        <div id="map"></div>
                        <button class="btn btn-primary w-100">Udostępnij Znalezisko</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker;
        
    </script>

</body>
</html>
